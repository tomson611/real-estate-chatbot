services:
  - type: web
    name: real-estate-chatbot-frontend
    env: static
    buildCommand: |
      cd frontend && \
      npm install && \
      echo "Current API_URL: $API_URL" && \
      # Replace API URL in the service
      sed -i "s|API_URL_PLACEHOLDER|$API_URL|g" src/app/services/api.service.ts && \
      echo "Checking api.service.ts after replacement:" && \
      cat src/app/services/api.service.ts && \
      # Build the application
      npm run build --prod && \
      # Verify the build
      echo "Checking built files for API URL:" && \
      grep -r "apiUrl" dist/real-estate-chatbot-frontend/ && \
      echo "Checking for localhost URLs:" && \
      grep -r "127.0.0.1" dist/real-estate-chatbot-frontend/ || echo "No localhost URLs found"
    staticPublishPath: frontend/dist/real-estate-chatbot-frontend
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: API_URL
        sync: false  # This means you'll need to set this value in the Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html 